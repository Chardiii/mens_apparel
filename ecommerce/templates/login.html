{% extends "base.html" %}

{% block title %}Login - Mode S7vn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Login to Your Account</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.login') }}" data-validate>
                    <div class="mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="username" required autofocus>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="password"
                                   id="login-pw-field" required>
                            <button type="button" class="btn btn-outline-secondary toggle-pw"
                                    data-target="login-pw-field">👁</button>
                        </div>
                    </div>
                    <div class="text-end mb-3">
                        <a href="{{ url_for('auth.forgot_password') }}" class="small text-muted">
                            Forgot password?
                        </a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
            <div class="card-footer text-center">
                Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
