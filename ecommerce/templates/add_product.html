{% extends "base.html" %}

{% block title %}Add Product - Mode S7vn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">Add New Product</h5></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('products.add_product') }}" enctype="multipart/form-data" data-validate>
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" class="form-control" name="category" placeholder="e.g. Clothing, Electronics">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Price (₱)</label>
                            <input type="number" class="form-control" name="price" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" class="form-control" name="stock" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Product Images</label>
                        <input type="file" class="form-control" name="images" multiple accept="image/*">
                        <div class="form-text">You can select multiple images. First image will be the primary.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Add Product</button>
                </form>
            </div>
            <div class="card-footer">
                <a href="{{ url_for('products.seller_dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
